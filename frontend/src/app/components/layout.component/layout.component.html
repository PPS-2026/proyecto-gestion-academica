<div class="app-shell">
  <mat-toolbar class="app-toolbar" color="primary">
    <button mat-icon-button class="menu-button" (click)="sidenav.toggle()" aria-label="Toggle menu">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="toolbar-title">Gestión Universitaria</span>
  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav #sidenav class="app-sidenav" mode="side" opened>
      <mat-nav-list>
        <a mat-list-item routerLink="/estudiantes">
          <span matListItemTitle>Estudiantes</span>
        </a>
        <a mat-list-item routerLink="/carreras">
          <span matListItemTitle>Carreras</span>
        </a>
      </mat-nav-list>

    </mat-sidenav>

    <mat-sidenav-content class="main-content">
      <div class="content-area">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
